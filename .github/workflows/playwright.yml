name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: playwright-xtrace/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: playwright-xtrace

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: playwright-xtrace

    - name: Run Playwright tests
      run: npx playwright test --headless
      working-directory: playwright-xtrace
      continue-on-error: true

    - name: Generate Allure Report
      run: npm run allure:generate
      working-directory: playwright-xtrace
      continue-on-error: true

    - name: Upload Playwright Report & Screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-xtrace/playwright-report/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: playwright-xtrace/allure-results/
        retention-days: 30

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: playwright-xtrace/allure-report/
        retention-days: 30

    # Deploy to GitHub Pages (uses the standard simple-elf action for publishing Allure Report)
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: playwright-xtrace/allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages
